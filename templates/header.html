<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Trading Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --background: #ffffff; --foreground: #0a0a0a;
            --card: #ffffff; --card-foreground: #0a0a0a;
            --primary: #18181b; --primary-foreground: #fafafa;
            --secondary: #f4f4f5; --secondary-foreground: #18181b;
            --muted: #f4f4f5; --muted-foreground: #71717a;
            --border: #e4e4e7; --input: #e4e4e7; --ring: #18181b;
            --buy: #10b981; --sell: #3b82f6; --success: #22c55e; --error: #ef4444;
        }

        body.dark {
            --background: #0a0a0a; --foreground: #fafafa;
            --card: #18181b; --card-foreground: #fafafa;
            --primary: #fafafa; --primary-foreground: #18181b;
            --secondary: #27272a; --secondary-foreground: #fafafa;
            --muted: #27272a; --muted-foreground: #a1a1aa;
            --border: #27272a; --input: #27272a; --ring: #d4d4d8;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--background); color: var(--foreground); line-height: 1.5; }

        .header { background-color: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .logo-section { display: flex; align-items: center; gap: 0.75rem; }
        .logo { width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; background: linear-gradient(135deg, var(--primary), #3b82f6); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .logo-icon { width: 1.25rem; height: 1.25rem; color: white; }
        .logo-text h1 { font-size: 1.125rem; font-weight: 600; }
        .logo-text p { font-size: 0.75rem; color: var(--muted-foreground); }
        .header-actions { display: flex; align-items: center; gap: 0.75rem; }

        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background-color: var(--background); color: var(--foreground); font-size: 0.875rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); text-decoration: none; }
        .btn:hover { background-color: var(--secondary); }
        .btn-icon { width: 2.5rem; height: 2.5rem; padding: 0; justify-content: center; }
        .icon { width: 1rem; height: 1rem; }

        .main-content { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }

        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

        .tabs { display: flex; background-color: rgba(244,244,245,0.5); border-radius: 0.5rem; padding: 0.25rem; margin-bottom: 1.25rem; }
        body.dark .tabs { background-color: rgba(39,39,42,0.5); }
        .tab { flex: 1; padding: 0.625rem 1rem; border: none; background: transparent; color: var(--muted-foreground); font-weight: 500; font-size: 0.875rem; cursor: pointer; border-radius: 0.375rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .tab.active { background-color: var(--card); color: var(--foreground); box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .tab.active.buy { color: #10b981; }
        .tab.active.sell { color: #3b82f6; }

        .form-group { margin-bottom: 1rem; }
        .label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--foreground); }
        .input, .select { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; background-color: var(--input); color: var(--foreground); font-size: 0.875rem; font-family: inherit; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .input:focus, .select:focus { outline: none; border-color: var(--ring); }

        .order-type-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
        .order-type-row .label { margin: 0; white-space: nowrap; }
        .radio-group { display: flex; gap: 0.5rem; flex: 1; }
        .radio-label { flex: 1; padding: 0.625rem; border: 1px solid var(--border); background-color: var(--background); color: var(--foreground); font-size: 0.875rem; font-weight: 500; cursor: pointer; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.375rem; transition: all 0.2s; }
        .radio-label input[type="radio"] { display: none; }
        .radio-label.checked { background-color: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }

        .estimated-info { background-color: rgba(244,244,245,0.5); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; font-size: 0.875rem; color: var(--muted-foreground); }
        body.dark .estimated-info { background-color: rgba(39,39,42,0.5); }
        .estimated-info p { margin-bottom: 0.25rem; }

        .btn-primary { width: 100%; padding: 0.625rem; border: none; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; color: white; transition: all 0.2s; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); display: block; text-align: center; }
        .btn-buy { background-color: #10b981; }
        .btn-buy:hover { background-color: #059669; }
        .btn-sell { background-color: #3b82f6; }
        .btn-sell:hover { background-color: #2563eb; }
        .btn-cancel { background-color: #ef4444; }
        .btn-cancel:hover { background-color: #dc2626; }

        .stock-list { max-height: calc(100vh - 12rem); overflow-y: auto; }
        .stock-item { padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 0.75rem; background-color: var(--card); }
        .stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .stock-info h4 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; }
        .stock-ticker { font-size: 0.75rem; color: var(--muted-foreground); }
        .stock-price { text-align: right; }
        .price { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .price-change { font-size: 0.75rem; font-weight: 500; }
        .price-change.positive { color: var(--buy); }
        .price-change.negative { color: var(--error); }
        .stock-details { display: flex; justify-content: space-between; font-size: 0.75rem; }
        .detail-item { display: flex; gap: 0.375rem; align-items: center; }
        .detail-label { color: var(--muted-foreground); }
        .bid-value { color: var(--buy); font-weight: 500; }
        .ask-value { color: var(--sell); font-weight: 500; }

        .transaction-list { max-height: calc(100vh - 12rem); overflow-y: auto; }
        .transaction-item { padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 0.75rem; background-color: var(--card); }
        .transaction-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .order-id { font-size: 0.75rem; font-weight: 600; color: var(--muted-foreground); }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 500; }
        .status-pending { background-color: rgba(59,130,246,0.1); color: #3b82f6; }
        .status-filled { background-color: rgba(34,197,94,0.1); color: #22c55e; }
        .status-cancelled { background-color: rgba(239,68,68,0.1); color: #ef4444; }
        .transaction-details { font-size: 0.875rem; margin-bottom: 0.5rem; }
        .transaction-type { font-weight: 600; }
        .transaction-type.buy { color: var(--buy); }
        .transaction-type.sell { color: var(--sell); }
        .transaction-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted-foreground); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Flash messages */
        .flash { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; font-weight: 500; }
        .flash-success { background-color: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .flash-error { background-color: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        /* Admin styles */
        .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); display: flex; align-items: center; justify-content: space-between; }
        .stat-card.blue { background: linear-gradient(135deg, rgb(239 246 255), rgb(239 246 255)); border-color: rgb(191 219 254); }
        .stat-card.emerald { background: linear-gradient(135deg, rgb(236 253 245), rgb(236 253 245)); border-color: rgb(167 243 208); }
        .stat-card.gray { background: linear-gradient(135deg, rgb(248 250 252), rgb(248 250 252)); border-color: rgb(226 232 240); }
        body.dark .stat-card.blue { background: linear-gradient(135deg, rgb(30 58 138 / 0.2), rgb(30 58 138 / 0.2)); border-color: rgb(30 58 138 / 0.5); }
        body.dark .stat-card.emerald { background: linear-gradient(135deg, rgb(6 78 59 / 0.2), rgb(6 78 59 / 0.2)); border-color: rgb(6 78 59 / 0.5); }
        body.dark .stat-card.gray { background: linear-gradient(135deg, rgb(30 41 59 / 0.2), rgb(30 41 59 / 0.2)); border-color: rgb(30 41 59 / 0.5); }
        .stat-card-icon { width: 2.5rem; height: 2.5rem; opacity: 0.4; }
        .stat-card-icon.blue { color: #3b82f6; }
        .stat-card-icon.emerald { color: #10b981; }
        .stat-card-icon.gray { color: #64748b; }
        .stat-card-content p { font-size: 0.875rem; color: var(--muted-foreground); margin-bottom: 0.5rem; }
        .stat-card-content .value { font-size: 1.875rem; font-weight: 600; }
        .admin-table-container { background-color: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); overflow: hidden; margin-bottom: 2rem; }
        .admin-table-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .admin-table-header h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .admin-table-header p { font-size: 0.875rem; color: var(--muted-foreground); }
        .admin-table { width: 100%; overflow-x: auto; }
        .admin-table table { width: 100%; border-collapse: collapse; }
        .admin-table thead { background-color: rgba(244,244,245,0.5); }
        body.dark .admin-table thead { background-color: rgba(39,39,42,0.5); }
        .admin-table th { padding: 1rem 1.5rem; text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.05em; }
        .admin-table tbody tr { border-top: 1px solid var(--border); transition: background-color 0.2s; }
        .admin-table tbody tr:hover { background-color: rgba(244,244,245,0.3); }
        body.dark .admin-table tbody tr:hover { background-color: rgba(39,39,42,0.3); }
        .admin-table td { padding: 1rem 1.5rem; font-size: 0.875rem; }
        .system-status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .system-status-card { background-color: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .system-status-card h3 { font-size: 0.875rem; font-weight: 500; color: var(--muted-foreground); margin-bottom: 0.75rem; }
        .system-status-card .value { font-size: 1.875rem; font-weight: 600; }
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 0.625rem; height: 0.625rem; border-radius: 9999px; background-color: #10b981; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-text { font-size: 1.125rem; font-weight: 600; color: #10b981; }
        .search-container { position: relative; margin-bottom: 1rem; }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 1rem; height: 1rem; color: var(--muted-foreground); pointer-events: none; }
        .search-input { width: 100%; padding: 0.625rem 0.75rem 0.625rem 2.25rem; border: 1px solid var(--border); border-radius: 0.5rem; background-color: var(--input); color: var(--foreground); font-size: 0.875rem; font-family: inherit; }
        .search-input:focus { outline: none; border-color: var(--ring); }
        .page { display: none; }
        .page.active { display: block; }
        .hidden { display: none; }
        .progress-bar-container { display: flex; align-items: center; gap: 0.75rem; }
        .progress-bar { flex: 1; max-width: 100px; height: 0.5rem; background-color: rgba(16,185,129,0.1); border-radius: 9999px; overflow: hidden; }
        .progress-bar.blue-bg { background-color: rgba(59,130,246,0.1); }
        .progress-bar-fill { height: 100%; background-color: #10b981; border-radius: 9999px; }
        .progress-bar-fill.blue { background-color: #3b82f6; }
        .progress-bar-value { font-weight: 500; width: 2rem; text-align: right; }
        .progress-bar-value.emerald { color: #10b981; }
        .progress-bar-value.blue { color: #3b82f6; }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
            .col-3, .col-4, .col-5 { grid-column: span 1; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
            .system-status-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!--
    ============================================================
    CGI ENDPOINT REFERENCE
    ============================================================
    All forms use method="GET". Your CGI scripts should read
    query-string parameters from QUERY_STRING or via a CGI
    library (e.g. Python cgi.FieldStorage).

    TRADER PAGE
    -----------
    Search stocks:
        GET /cgi-bin/stocks.cgi?action=search&q=AAPL

    Place buy order (market):
        GET /cgi-bin/order.cgi?action=buy&ticker=AAPL&shares=10&order_type=market

    Place buy order (limit):
        GET /cgi-bin/order.cgi?action=buy&ticker=AAPL&shares=10&order_type=limit&limit_price=149.50

    Place sell order (market):
        GET /cgi-bin/order.cgi?action=sell&ticker=AAPL&shares=10&order_type=market

    Place sell order (limit):
        GET /cgi-bin/order.cgi?action=sell&ticker=AAPL&shares=10&order_type=limit&limit_price=151.00

    Cancel order:
        GET /cgi-bin/order.cgi?action=cancel&ticker=AAPL&order_id=1003

    ADMIN PAGE
    ----------
    View admin dashboard:
        GET /cgi-bin/admin.cgi?action=dashboard

    All responses should redirect back to index.html (or the
    admin page) with a flash message parameter, e.g.:
        Location: /index.html?flash=Order+placed&flash_type=success
    ============================================================
    -->

    <!-- =================== TRADER PAGE =================== -->
    <div id="traderPage" class="page active">
        <header class="header">
            <div class="header-container">
                <div class="logo-section">
                    <div class="logo">
                        <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>Stock Trading Machine</h1>
                        <p>Live Trading Simulator</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon" id="themeToggle" type="button">
                        <svg class="icon" id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <button class="btn" type="button" id="goToAdmin">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3zM14 13a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/>
                        </svg>
                        Admin Dashboard
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Flash message banner (populated by JS from URL param) -->
            <div id="flashBanner" style="display:none; margin-bottom:1rem;"></div>

            <div class="grid">

                <!-- ===== Stock Overview ===== -->
                <div class="col-3">
                    <div class="card">
                        <h3 class="card-title">Stock Overview</h3>

                        <!--
                            CGI: GET /cgi-bin/stocks.cgi?action=search&q=...
                            The CGI script should return the filtered stock list
                            as an HTML fragment or redirect with results embedded.
                            For a pure static demo the list is rendered by JS below.
                        -->
                        <form action="/cgi-bin/stocks.cgi" method="GET">
                            <input type="hidden" name="action" value="search">
                            <div class="search-container">
                                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                                </svg>
                                <input type="text" name="q" class="search-input" id="stockSearch" placeholder="Search stocks..." autocomplete="off">
                            </div>
                        </form>

                        <div class="stock-list" id="stockList"></div>
                    </div>
                </div>

                <!-- ===== Place Order ===== -->
                <div class="col-4">
                    <div class="card" style="margin-bottom: 1.25rem;">
                        <h3 class="card-title">Place Order</h3>

                        <div class="tabs">
                            <button type="button" class="tab buy active" data-tab="buy">
                                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                                </svg>
                                Buy
                            </button>
                            <button type="button" class="tab sell" data-tab="sell">
                                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/>
                                </svg>
                                Sell
                            </button>
                        </div>

                        <!-- ---- Buy Tab ---- -->
                        <div class="tab-content active" id="buyTab">
                            <!--
                                CGI: GET /cgi-bin/order.cgi?action=buy&ticker=...&shares=...&order_type=market|limit[&limit_price=...]
                            -->
                            <form action="/cgi-bin/order.cgi" method="GET" id="buyForm">
                                <input type="hidden" name="action" value="buy">

                                <div class="order-type-row">
                                    <span class="label">Order Type</span>
                                    <div class="radio-group">
                                        <label class="radio-label checked" id="buyMarketLabel">
                                            <input type="radio" name="order_type" value="market" checked onchange="handleBuyOrderType(this)">
                                            Market Order
                                        </label>
                                        <label class="radio-label" id="buyLimitLabel">
                                            <input type="radio" name="order_type" value="limit" onchange="handleBuyOrderType(this)">
                                            Limit Order
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="label" for="buyTicker">Ticker</label>
                                    <select class="select" name="ticker" id="buyTicker" onchange="syncTicker('buy')"></select>
                                </div>

                                <div class="form-group">
                                    <label class="label" for="buyShares">Shares</label>
                                    <input type="number" class="input" name="shares" id="buyShares" placeholder="100" min="1" oninput="updateEstimate('buy')">
                                </div>

                                <div class="form-group hidden" id="buyLimitPriceGroup">
                                    <label class="label" for="buyLimitPrice">Limit Price</label>
                                    <input type="number" class="input" name="limit_price" id="buyLimitPrice" placeholder="0.00" step="0.01" oninput="updateEstimate('buy')">
                                </div>

                                <div class="estimated-info">
                                    <p>Estimated Total: <strong id="buyEstimatedTotal">$0.00</strong></p>
                                    <p style="font-size:0.75rem; color: var(--muted-foreground);">Current Spread: <span id="buySpread">$0.00</span></p>
                                </div>

                                <button type="submit" class="btn-primary btn-buy">Place Buy Order</button>
                            </form>
                        </div>

                        <!-- ---- Sell Tab ---- -->
                        <div class="tab-content" id="sellTab">
                            <!--
                                CGI: GET /cgi-bin/order.cgi?action=sell&ticker=...&shares=...&order_type=market|limit[&limit_price=...]
                            -->
                            <form action="/cgi-bin/order.cgi" method="GET" id="sellForm">
                                <input type="hidden" name="action" value="sell">

                                <div class="order-type-row">
                                    <span class="label">Order Type</span>
                                    <div class="radio-group">
                                        <label class="radio-label checked" id="sellMarketLabel">
                                            <input type="radio" name="order_type" value="market" checked onchange="handleSellOrderType(this)">
                                            Market Order
                                        </label>
                                        <label class="radio-label" id="sellLimitLabel">
                                            <input type="radio" name="order_type" value="limit" onchange="handleSellOrderType(this)">
                                            Limit Order
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="label" for="sellTicker">Ticker</label>
                                    <select class="select" name="ticker" id="sellTicker" onchange="syncTicker('sell')"></select>
                                </div>

                                <div class="form-group">
                                    <label class="label" for="sellShares">Shares</label>
